# NATMesh Server Configuration
server:
  host: "0.0.0.0"
  port: 8080
  workers: 4

database:
  path: "data/natmesh.db"

jwt:
  secret: "change-this-to-a-secure-random-secret-in-production"
  expiration_hours: 72

websocket:
  heartbeat_interval_sec: 15
  heartbeat_timeout_sec: 45

# Virtual network IP pools (per network name)
# Each network gets a subnet from which virtual IPs are allocated.
ipam:
  pools:
    home: "10.0.0.0/16"
    office: "172.16.0.0/16"
    default: "10.0.0.0/24"

logging:
  level: "info"  # trace, debug, info, warn, error, critical
  pattern: "[%Y-%m-%d %H:%M:%S.%e] [%^%l%$] [%s:%#] %v"

admin:
  enabled: true
  username: "admin"
  password: "admin123456"
