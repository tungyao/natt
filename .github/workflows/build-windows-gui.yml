---
name: Build Windows GUI

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '编译类型'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ runner.os }}-${{ github.event.inputs.build_type || 'Release' }}-gui-${{ hashFiles('.github/workflows/build-windows-gui.yml', 'CMakeLists.txt', 'cmake/**', 'include/**', 'src/**', 'cmd/**') }}
          restore-keys: |
            cmake-${{ runner.os }}-${{ github.event.inputs.build_type || 'Release' }}-gui-
            cmake-${{ runner.os }}-

      - name: Install Conan dependencies
        run: |
          conan install . -of=build --build=missing -s compiler.cppstd=23

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }} -DBUILD_GUI=ON

      - name: Build natt-gui
        run: |
          cmake --build build --target natt-gui --config ${{ github.event.inputs.build_type || 'Release' }} -j

      - name: Package natt-gui with dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $buildType = "${{ github.event.inputs.build_type || 'Release' }}"
          $stageDir = "natt-gui-package"
          $conanPackages = "$env:USERPROFILE\.conan2\p"

          New-Item -ItemType Directory -Path $stageDir -Force

          # Try both possible output locations (Ninja -> build/, VS -> build/$buildType/)
          $exePaths = @("build/$buildType/natt-gui.exe", "build/natt-gui.exe")
          $exeCopied = $false
          foreach ($path in $exePaths) {
            if (Test-Path $path) {
              Copy-Item $path -Destination (Join-Path $stageDir "natt-gui.exe")
              Write-Host "Copied from $path"
              $exeCopied = $true
              break
            }
          }
          if (-not $exeCopied) {
            throw "natt-gui.exe not found in build/ or build/Release/"
          }

          # Copy Conan shared DLLs (try multiple naming patterns)
          $dllPatterns = @(
            @("libssl-3-x64.dll", "libssl-3*.dll"),
            @("libcrypto-3-x64.dll", "libcrypto-3*.dll"),
            @("spdlog.dll", "spdlog*.dll"),
            @("yaml-cpp.dll", "yaml-cpp*.dll")
          )
          foreach ($entry in $dllPatterns) {
            $found = Get-ChildItem -LiteralPath $conanPackages -Recurse -Filter $entry[0] -ErrorAction SilentlyContinue -ErrorVariable err | Select-Object -First 1
            if (-not $found) {
              $found = Get-ChildItem -LiteralPath $conanPackages -Recurse -Filter $entry[1] -ErrorAction SilentlyContinue -ErrorVariable err | Select-Object -First 1
            }
            if ($found) {
              Copy-Item $found.FullName -Destination $stageDir
              Write-Host "Copied $($found.Name)"
            }
          }

          # Run windeployqt to collect Qt6 DLLs and plugins
          $windeployqt = Get-ChildItem -LiteralPath $conanPackages -Recurse -Filter "windeployqt*.exe" -ErrorAction SilentlyContinue -ErrorVariable err | Select-Object -First 1
          if ($windeployqt) {
            Write-Host "Found windeployqt at: $($windeployqt.DirectoryName)"
            $output = & $windeployqt.FullName "$stageDir/natt-gui.exe" --no-translations 2>&1
            Write-Host $output
            if ($LASTEXITCODE -ne 0) {
              Write-Host "windeployqt detected non-Qt executable (static Qt linking)"
              # Fallback: copy Qt DLLs from the same directory as windeployqt
              $qtBinDir = $windeployqt.DirectoryName
              $qtDlls = @("Qt6Core.dll", "Qt6Gui.dll", "Qt6Widgets.dll")
              foreach ($dll in $qtDlls) {
                $src = Join-Path $qtBinDir $dll
                if (Test-Path $src) {
                  Copy-Item $src -Destination $stageDir
                  Write-Host "Copied $dll from windeployqt dir"
                }
              }
              # Copy platforms plugin
              $pluginSrc = Join-Path $qtBinDir "..\plugins\platforms\qwindows.dll"
              if (Test-Path $pluginSrc) {
                $platformDst = Join-Path $stageDir "platforms"
                New-Item -ItemType Directory -Path $platformDst -Force | Out-Null
                Copy-Item $pluginSrc -Destination $platformDst
                Write-Host "Copied qwindows.dll plugin"
              }
            }
          }

          # List what we packaged
          Get-ChildItem -LiteralPath $stageDir -Recurse -File | ForEach-Object { Write-Host $_.FullName }

          # Reset exit code (windeployqt may have set it to non-zero)
          cmd /c "exit 0"

      - name: Upload natt-gui artifact
        uses: actions/upload-artifact@v4
        with:
          name: natt-gui-windows-x64
          path: natt-gui-package/
          if-no-files-found: error
